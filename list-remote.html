<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wesley de Oliveira – 77487</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif;}
  
  body {
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    min-height: 100vh;
    padding: 20px;
    color: #fff;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5rem;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px #000;
  }

  .controls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
  }

  .controls button, .controls select, .controls input {
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
  }

  .controls button {
    background: linear-gradient(135deg, #ff6a00, #ee0979);
    color: white;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .controls button:hover {
    transform: scale(1.05);
  }

  .controls select, .controls input {
    border: 2px solid #eee;
    background: #fff;
    color: #333;
  }

  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    background: rgba(255,255,255,0.9);
    color: #222;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.3s, opacity 0.5s;
    overflow: hidden;
    opacity: 0;
  }

  .card.show { opacity: 1; }

  .card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .card img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
  }

  .error {
    text-align: center;
    font-weight: bold;
    color: #ff4b5c;
    margin-top: 20px;
    font-size: 1.2rem;
  }

  #rm-search { display: none; margin-left:10px; }
</style>
</head>
<body>

<h1>🌐 Remote APIs Explorer</h1>

<div class="controls">
  <!-- Countries -->
  <button id="btn-countries">Load Countries</button>
  <select id="region-select">
    <option value="europe">Europe</option>
    <option value="asia">Asia</option>
    <option value="africa">Africa</option>
    <option value="americas">Americas</option>
    <option value="oceania">Oceania</option>
  </select>

  <!-- Users -->
  <button id="btn-users">Load Users</button>

  <!-- Rick & Morty -->
  <button id="btn-rm">Load Rick & Morty Characters</button>
  <input type="text" id="rm-search" placeholder="Search Rick & Morty Character">
</div>

<div id="results"></div>
<div class="error" id="error"></div>

<script>
// Containers
const resultsContainer = document.getElementById('results');
const errorContainer = document.getElementById('error');

// Countries
const countriesBtn = document.getElementById('btn-countries');
const regionSelect = document.getElementById('region-select');

// Users
const usersBtn = document.getElementById('btn-users');

// Rick & Morty
const rmBtn = document.getElementById('btn-rm');
const rmSearch = document.getElementById('rm-search');
let allRMCharacters = [];

// Clear UI
function clearUI() {
  resultsContainer.innerHTML = '';
  errorContainer.textContent = '';
  rmSearch.style.display = 'none';
}

// -------------------- Countries --------------------
async function fetchCountries(region) {
  clearUI();
  try {
    const res = await fetch(`https://restcountries.com/v3.1/region/${region}`);
    if (!res.ok) throw new Error('Failed to fetch countries');
    const data = await res.json();

    data.forEach((country, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${country.flags.svg}" alt="${country.name.common} flag">
        <h3>${country.name.common}</h3>
        <p>Capital: ${country.capital ? country.capital[0] : 'N/A'}</p>
        <p>Population: ${country.population.toLocaleString()}</p>
        <p>Region: ${country.region}</p>
      `;
      resultsContainer.appendChild(card);
      setTimeout(() => card.classList.add('show'), i*50);
    });

  } catch (err) {
    console.error(err);
    errorContainer.textContent = err.message;
  }
}

countriesBtn.addEventListener('click', () => fetchCountries(regionSelect.value));
regionSelect.addEventListener('change', () => fetchCountries(regionSelect.value));

// -------------------- Users --------------------
usersBtn.addEventListener('click', async () => {
  clearUI();
  try {
    const res = await fetch('https://jsonplaceholder.typicode.com/users');
    if (!res.ok) throw new Error('Failed to fetch users');
    const users = await res.json();

    users.forEach((user, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="https://i.pravatar.cc/150?img=${i+1}" alt="${user.name}">
        <h3>${user.name} (${user.username})</h3>
        <p>Email: <a href="mailto:${user.email}">${user.email}</a></p>
        <p>Website: <a href="http://${user.website}" target="_blank">${user.website}</a></p>
        <p>City: ${user.address.city}</p>
      `;
      resultsContainer.appendChild(card);
      setTimeout(() => card.classList.add('show'), i*50);
    });

  } catch (err) {
    console.error(err);
    errorContainer.textContent = err.message;
  }
});

// -------------------- Rick & Morty --------------------
rmBtn.addEventListener('click', async () => {
  clearUI();
  rmSearch.value = '';
  rmSearch.style.display = 'inline-block'; // mostra input somente após carregar

  try {
    const res = await fetch('https://rickandmortyapi.com/api/character');
    if (!res.ok) throw new Error('Failed to fetch Rick & Morty characters');

    const data = await res.json();
    allRMCharacters = data.results;
    displayRMCharacters(allRMCharacters);

  } catch (err) {
    console.error(err);
    errorContainer.textContent = err.message;
  }
});

// -------------------- Search Rick & Morty --------------------
rmSearch.addEventListener('input', () => {
  const query = rmSearch.value.toLowerCase();
  const filtered = allRMCharacters.filter(char => char.name.toLowerCase().includes(query));
  displayRMCharacters(filtered);
});

// -------------------- Display Rick & Morty --------------------
function displayRMCharacters(chars) {
  resultsContainer.innerHTML = '';
  if(chars.length === 0){
    resultsContainer.innerHTML = '<p class="error">No characters found.</p>';
    return;
  }
  chars.forEach((char, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${char.image}" alt="${char.name}">
      <h3>${char.name}</h3>
      <p>Status: <span style="color:${char.status==='Alive'?'green':'red'}">${char.status}</span></p>
      <p>Species: ${char.species}</p>
      <p>Gender: ${char.gender}</p>
      <p>Origin: ${char.origin.name}</p>
    `;
    resultsContainer.appendChild(card);
    setTimeout(() => card.classList.add('show'), i*50);
  });
}
</script>

</body>
</html>
