<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remote Data Fetcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        #button-container {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #remote-data-container {
            max-width: 1000px;
            margin: 0 auto 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .error {
            color: red;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🌐 Remote Data Fetcher</h1>

    <div id="button-container">
        <button id="btn-countries">Load Countries</button>
        <button id="btn-users">Load Users</button>
        <button id="btn-rm">Load Rick & Morty</button>
    </div>

    <div id="remote-data-container">
        <!-- Data will appear here -->
    </div>

    <!-- Link your JS file here -->
    <script src="list-remote.js"></script>

</body>
</html>
